<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Academic Record</title>
	<!--TASK 4:Create an 'Academic Record' section displaying a grade table. -->
</head>
<body>
	<header>
		<h1>Academic Record</h1>
	</header>

	<main>
		<!--Use <table> with <thead>, <tbody> and <tfoot> sections — never omit these -->
		<section>
			<h2>Year 2 Academic Result</h2>
			<table border="1" cellpadding="8" cellspacing="0"> 
			<caption>Year 2 Academic Results</caption> 
			<thead> 
				<tr> 
					<th scope="col" colspan="2">Semester 1 &amp; 2</th> 
					<th scope="col">Credits</th> 
					<th scope="col">Grade</th> 
				</tr> 
			</thead>

			<tbody>
				
			</tbody>

			<tfoot>
				<tr><td colspan="2">Total</td><td><strong>120</strong></td></tr> 
			</tfoot>

			</table>

		</section>
	</main>
	
</body>
</html>
