<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!--Create a 'Contact Me' section with a fully marked-up form. Use the inline style attribute (not an external stylesheet) to apply basic visual presentation — practising HTML's built-in styling mechanism. -->
	<title>Contact Me</title>
</head>

<!--Apply the inline style attribute to at least 5 different elements to demonstrate: color, background color, font-size, border, and padding -->
<body style="font-family: Arial; background-color: #f9f9f9;">
	<header>
		<h1 style="border:2px solid black; padding: 15px;color:#D5DFEB;font-size:40px; background-color: #3966A2;text-align: center;">Contact Me</h1>
	</header>
	
	<main>
		<section>
			<!--Use <form action="#" method="post"> with proper <fieldset> and <legend> grouping -->
			<form action="#" method="post">
				<fieldset style="border: 2px solid navy;padding: 15px;background-color:#fff ;">

					<legend style="font-size: 20px; color: #3966A2;">Get In Touch</legend>

					 <!--Every input must have a linked <label for="..."> — no placeholder-only labelling -->
					 <!-- Include these input types: text, email, tel, number, date, range, and textarea-->

					<!--Name-->
					<label for="fullname">Full Name:</label><br>
					<input type="text" id="fullname" name="fullname" 
					style="border: 2px solid navy; padding: 6px; font-size: 14px;"
					placeholder="Your full name" required maxlength="60"> <br><br>

					<!--Email-->
					<label for="email">Email:</label><br>
					<input type="email" id="email" name="email" 
					style="border: 2px solid navy; padding: 6px; font-size: 14px;"
					placeholder="example@email.com" required maxlength="60"> <br><br>

					<!--Phone-->
					<label for="phone">Phone Number:</label><br>
					<input type="tel" id="phone" name="phone" 
					style="border: 2px solid navy; padding: 6px; font-size: 14px;"
					placeholder="012-3456789" required maxlength="12"> <br><br>

					<!--Age-->
					<label for="age">Your Age:</label><br>
					<input type="number" id="age" name="age" 
					style="border: 2px solid navy; padding: 6px; font-size: 14px;"
					required min="18" max="99"> <br><br>

					<!--Prefered Contact Date-->
					<label for="contactDate">Prefered Contact Date:</label><br>
					<input type="date" id="contactDate" name="contactDate" 
					style="border: 2px solid navy; padding: 6px; font-size: 14px;"
					required> <br><br>

					<!--Urgency Level-->
					<label for="urgency">Urgency Level (1-5):</label><br>
					<input type="range" id="urgency" name="urgency" 
					required min="0" max="5"> <br><br>

					<!--Textarea Message-->
					<label for="message">Message to leave:</label><br>
					<textarea id="message"name="message"rows="5"cols="40"style="border: 2px solid navy;padding: 6px;font-size: 14px;"
						placeholder="Leave your message here..."required>
					</textarea><br><br>
				</fieldset>


				<!--Subject fieldset-->
				<fieldset style="border: 2px solid navy;padding: 15px;background-color:#fff ;">
					<legend style="font-size: 20px; color: #3966A2;">Main Purpose to Contact</legend>
					<!--Use <select> with <optgroup> and <option> elements for a 'Subject' dropdown -->
					<label for="subject">Subject:</label><br>
					<select id="subject"name="subject">
						<optgroup label="General">
							<option value="feedback">Feedback</option>
							<option value="question">Question</option>
						</optgroup>

						<optgroup label="Opportunities">
							<option value="sponsor">Sponsorship</option>
							<option value="hackathon">Hackathon Teammates</option>
							<option value="job">Job & Collaboration</option>
						</optgroup>

						<optgroup label="Others">
							<option value="others">Others</option>
						</optgroup>

					</select>
				</fieldset>


				<!--Prefered Contact Time & Method Fieldset-->
				<!--Add at least 3 checkboxes and 3 radio buttons with correct matching name attribute grouping-->
				<!--Checkboxes,can choose more than 1-->
				<fieldset style="border: 2px solid navy;padding: 15px;background-color:#fff ;">
					<legend style="font-size: 20px; color: #3966A2;">Prefered Contact Time & Method</legend>

					<p style="color:darkblue;">Choose your preffered contact methods:</p>
					<label for="contactEmail">Email</label>
					<input type="checkbox" id="contactEmail"name="contactMethod"value="contactEmail"><br>

					<label for="contactPhone">Phone Call</label>
					<input type="checkbox" id="contactPhone"name="contactMethod"value="contactPhone"><br>

					<label for="contactWhatsapp">Whatsapp Message</label>
					<input type="checkbox" id="contactWhatsapp"name="contactMethod"value="contactWhatsapp"><br><br>

				<!--Radio button,can choose onli 1-->
				<p style="color:darkblue;">Choose your preffered contact time:</p>
				<label for="morning">Morning</label>
				<input type="radio" id="morning"name="contactTime"value="morning"><br>

				<label for="afternoon">Afternoon</label>
				<input type="radio" id="afternoon"name="contactTime"value="afternoon"><br>

				<label for="evening">Evening</label>
				<input type="radio" id="evening"name="contactTime"value="evening"><br>

				</fieldset>

				<!--Submit Button-->
				<button type="submit"
				style ="border:none; padding: 10px;color:#D5DFEB;font-size:20px; background-color: #3966A2;text-align: center;" >Submit Form</button>

			</form>
		</section>
	</main>

	<footer>
		<small>&copy; 2026 Meishuet's Portfolio. All rights reserved.</small>
	</footer>
</body>
</html>
